packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@sentry/cli': true
  '@swc/core': true
  better-sqlite3: true
  core-js: true
  esbuild: true
  msgpackr-extract: false
  msw: true
  nodemailer: true
  protobufjs: true
  sharp: true
  typesense-instantsearch-adapter: true
  unrs-resolver: true
  workerd: true

overrides:
  '@internationalized/date': '3.12.2'
  '@types/react': '19.2.7'
  '@types/react-dom': '19.2.3'
  '@codemirror/state': '6.7.0'

packageExtensions:
  '@coursebuilder/ui@*':
    dependencies:
      '@internationalized/date': '3.12.2'
  # @uiw/react-markdown-editor imports @codemirror/state and @codemirror/view
  # without declaring them (relies on hoisting), which breaks on a clean install
  # once @codemirror/state is pinned via overrides. Declare them so pnpm always
  # links them into the package.
  '@uiw/react-markdown-editor@*':
    dependencies:
      '@codemirror/state': '^6.0.0'
      '@codemirror/view': '^6.0.0'
